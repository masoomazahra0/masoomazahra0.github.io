<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Masooma Zahra | Dramatic Robot Stage</title>
    <style>
        body { 
            margin: 0;
            padding: 20px;
            background-color: #000000;
            font-family: Arial, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        /* --- STAGE VIEWPORT --- */
        .theater-stage {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 480px;
            background: #000000;
            border: 2px solid #111;
            border-radius: 8px;
            overflow: hidden;
            perspective: 800px;
        }

        /* Elements that completely vanish */
        .stage-props {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .vanished {
            opacity: 0 !important;
            transform: scale(0) !important;
            pointer-events: none;
        }

        /* Hello World Title */
        #stage-headline {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 52px;
            font-weight: bold;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00ffcc;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
            z-index: 5;
        }

        /* Fixed Pakistan Flag Position */
        .stage-flag {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 110px;
            height: 73px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            z-index: 5;
        }
        .flag-w { width: 25%; background: #ffffff; }
        .flag-g { width: 75%; background: #004124; position: relative; }
        .flag-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); width: 42px; height: 42px; }

        /* --- MECHANICAL ROBOT ACTOR --- */
        .robot-actor {
            position: absolute;
            bottom: 30px;
            left: -120px;
            width: 70px;
            height: 110px;
            z-index: 20;
            transition: left 3.2s linear, bottom 1s ease, transform 1s ease, color 0.2s;
            color: #00ffff; /* Neon Cyan highlights */
        }

        .robot-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Robot Metal Frame Shapes */
        .metal-plate {
            fill: #000000;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linejoin: miter;
        }

        .glowing-eye {
            fill: currentColor;
            transition: all 0.2s ease;
        }

        .robot-expression {
            stroke: currentColor;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            transition: all 0.2s ease;
        }

        /* Joint Pivot Locations */
        #bot-arm-l { transform-origin: 15px 45px; }
        #bot-arm-r { transform-origin: 55px 45px; }
        #bot-leg-l { transform-origin: 22px 80px; }
        #bot-leg-r { transform-origin: 48px 80px; }

        /* Marching Joint Motion */
        .marching #bot-arm-l { animation: jointSwing 0.4s infinite alternate linear; }
        .marching #bot-arm-r { animation: jointSwingInv 0.4s infinite alternate linear; }
        .marching #bot-leg-l { animation: jointSwingInv 0.4s infinite alternate linear; }
        .marching #bot-leg-r { animation: jointSwing 0.4s infinite alternate linear; }
