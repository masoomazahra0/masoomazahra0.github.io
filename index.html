<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Animated Scene</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* Glow Text */
#hello {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 60px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Pakistan Flag Popup */
#flag {
  position: absolute;
  right: 20px;
  top: 100px;
  width: 120px;
  height: 80px;
  border: 2px solid white;
  animation: pop 2s ease-in-out infinite alternate;
}

@keyframes pop {
  from { transform: scale(0.8); }
  to { transform: scale(1.1); }
}

/* Robot */
#robot {
  position: absolute;
  bottom: 50px;
  left: 0;
  width: 60px;
  height: 60px;
  background: gray;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="hello">HELLO WORLD</div>

<!-- Pakistan Flag -->
<svg id="flag" viewBox="0 0 60 40">
  <rect width="60" height="40" fill="green"/>
  <rect width="15" height="40" fill="white"/>
  <circle cx="38" cy="20" r="10" fill="white"/>
</svg>

<div id="robot"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Airplane state
let planeX = 0;
let planeY = 150;
let angle = 0;

// Robot movement
let robotX = 0;
let direction = 2;

// Smoke particles
let particles = [];

function drawPlane(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(30, 10);
  ctx.lineTo(0, -10);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function createSmoke(x, y) {
  particles.push({
    x: x,
    y: y,
    alpha: 1,
    size: Math.random() * 5 + 2
  });
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    ctx.fillStyle = `rgba(200,200,200,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    p.y += 1;
    p.alpha -= 0.02;
  }

  particles = particles.filter(p => p.alpha > 0);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Plane movement + rotation
  planeX += 3;
  angle += 0.05;
  if (planeX > canvas.width) planeX = 0;

  createSmoke(planeX, planeY);
  drawPlane(planeX, planeY, angle);
  drawParticles();

  // Robot movement
  robotX += direction;
  if (robotX > canvas.width - 60 || robotX < 0) direction *= -1;

  document.getElementById("robot").style.left = robotX + "px";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
