<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Robot Animation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
  }

  #hello {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 0px;
    font-weight: bold;
    opacity: 0;
    transition: all 0.5s ease;
  }

  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .robot {
    position: absolute;
    bottom: 80px;
    left: -150px;
    width: 100px;
    transition: left 4s linear;
  }

  .head {
    width: 60px;
    height: 60px;
    background: gray;
    border-radius: 10px;
    margin: auto;
    position: relative;
  }

  .eye {
    width: 8px;
    height: 8px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
    top: 20px;
  }

  .eye.left { left: 15px; }
  .eye.right { right: 15px; }

  .mouth {
    width: 20px;
    height: 5px;
    background: black;
    position: absolute;
    bottom: 10px;
    left: 20px;
    transition: all 0.3s;
  }

  .body {
    width: 80px;
    height: 70px;
    background: #888;
    margin: auto;
    border-radius: 10px;
  }

  .arm {
    width: 10px;
    height: 50px;
    background: gray;
    position: absolute;
    top: 80px;
  }

  .arm.left { left: -15px; transform-origin: top; }
  .arm.right { right: -15px; transform-origin: top; }

  .walk {
    animation: walkArms 0.5s infinite alternate;
  }

  @keyframes walkArms {
    from { transform: rotate(-20deg); }
    to { transform: rotate(20deg); }
  }

  .wave {
    animation: wave 0.5s infinite alternate;
  }

  @keyframes wave {
    from { transform: rotate(0deg); }
    to { transform: rotate(60deg); }
  }

  .shake {
    animation: shake 0.2s infinite;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px, -5px); }
    50% { transform: translate(-5px, 5px); }
    75% { transform: translate(5px, 5px); }
    100% { transform: translate(-5px, -5px); }
  }
</style>
</head>
<body>

<div id="hello">HELLO WORLD</div>

<div id="scene">
  <div class="robot" id="robot">
    <div class="head" id="head">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth" id="mouth"></div>
    </div>
    <div class="body"></div>
    <div class="arm left" id="armL"></div>
    <div class="arm right" id="armR"></div>
  </div>
</div>

<script>
const robot = document.getElementById("robot");
const hello = document.getElementById("hello");
const mouth = document.getElementById("mouth");
const armL = document.getElementById("armL");
const armR = document.getElementById("armR");
const head = document.getElementById("head");

// Step 1: Walk to center
setTimeout(() => {
  robot.style.left = "45%";
  robot.classList.add("walk");
}, 500);

// Step 2: Stop, smile, wave
setTimeout(() => {
  robot.classList.remove("walk");
  mouth.style.height = "15px";
  mouth.style.borderRadius = "10px";

  armR.classList.add("wave");
}, 4500);

// Step 3: Hello World appears and pops
setTimeout(() => {
  hello.style.opacity = "1";
  hello.style.fontSize = "60px";

  setTimeout(() => {
    hello.style.transform = "scale(1.5)";
  }, 500);

}, 6000);

// Step 4: Robot screams (shake effect)
setTimeout(() => {
  document.body.classList.add("shake");
  mouth.style.background = "red";
  mouth.style.height = "30px";
  hello.innerText = "!!! HELLO WORLD !!!";
}, 7500);

setTimeout(() => {
  document.body.classList.remove("shake");
  armR.classList.remove("wave");
}, 9000);
</script>

</body>
</html>
