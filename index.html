<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: sans-serif; }
    
    /* Pakistan Flag */
    #flag {
        width: 150px; height: 100px; background: #006600;
        position: absolute; top: 20px; right: 20px;
        display: flex; align-items: center; justify-content: center;
        border-left: 20px solid white;
    }
    #flag::before { content: "🌙 ★"; color: white; font-size: 30px; }

    /* Robot */
    #robot {
        width: 50px; height: 80px; background: #888;
        position: absolute; bottom: 50px; left: -100px;
        border-radius: 10px; animation: robotMove 10s linear forwards;
    }

    /* Text */
    #msg { position: absolute; top: 40%; left: 40%; font-size: 40px; opacity: 0; }

    /* Airplane */
    #plane { position: absolute; top: 100px; left: -150px; font-size: 50px; }

    /* Animations */
    @keyframes robotMove {
        0% { left: -100px; }
        20% { left: 40%; transform: rotateY(0deg); }
        30% { transform: rotateY(180deg); } /* Turn to screen */
        40% { transform: rotateY(180deg) scale(1.2); } /* Come ahead */
        50% { opacity: 1; } /* Hand wave logic would go here */
        60% { content: "Hello World"; }
        70% { opacity: 0; }
        80% { top: 20px; left: 80%; } /* Grabs flag */
        90% { top: 20px; left: 80%; background: red; } /* Drops it */
        100% { left: 100%; } /* Runs away */
    }
</style>
</head>
<body>

    <div id="flag"></div>
    <div id="robot">🤖</div>
    <div id="msg">Hello World</div>
    <div id="plane">✈️💨</div>

</body>
</html>
