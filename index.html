<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Animated Scene v2</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #000010, #000);
  font-family: Arial;
}

/* Glow text */
#hello {
  position: absolute;
  top: 30px;
  width: 100%;
  text-align: center;
  font-size: 55px;
  color: #00ffd5;
  text-shadow: 0 0 10px #00ffd5, 0 0 25px #00ffd5;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Flag */
#flag {
  position: absolute;
  right: 20px;
  top: 100px;
  width: 140px;
  height: 90px;
  border: 2px solid white;
  animation: pop 2s infinite alternate;
}

@keyframes pop {
  from { transform: scale(0.9); }
  to { transform: scale(1.05); }
}
</style>
</head>

<body>

<div id="hello">HELLO WORLD</div>

<!-- 🇵🇰 Pakistan Flag (correct crescent + star) -->
<svg id="flag" viewBox="0 0 60 40">
  <rect width="60" height="40" fill="#006600"/>

  <!-- white stripe -->
  <rect width="15" height="40" fill="white"/>

  <!-- crescent -->
  <circle cx="38" cy="20" r="10" fill="white"/>
  <circle cx="41" cy="20" r="8" fill="#006600"/>

  <!-- star -->
  <polygon points="48,14 50,20 56,20 51,24 53,30 48,26 43,30 45,24 40,20 46,20"
           fill="white"/>
</svg>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Jet
let jetX = 0;
let jetY = 180;

// particles (hearts)
let hearts = [];

// robot (human-like)
let robotX = 0;
let dir = 2;

function drawJet(x, y) {
  ctx.fillStyle = "#ffffff";

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 40, y + 10);
  ctx.lineTo(x, y - 10);
  ctx.closePath();
  ctx.fill();

  // wings
  ctx.beginPath();
  ctx.moveTo(x + 15, y);
  ctx.lineTo(x + 5, y + 20);
  ctx.lineTo(x + 25, y + 10);
  ctx.fill();
}

// ❤️ heart particle
function createHeart(x, y) {
  hearts.push({
    x,
    y,
    size: Math.random() * 6 + 4,
    alpha: 1,
    vy: Math.random() * 1 + 0.5
  });
}

function drawHearts() {
  for (let h of hearts) {
    ctx.save();
    ctx.globalAlpha = h.alpha;
    ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.moveTo(h.x, h.y);
    ctx.bezierCurveTo(h.x - h.size, h.y - h.size,
                      h.x - h.size*1.5, h.y + h.size/2,
                      h.x, h.y + h.size);
    ctx.bezierCurveTo(h.x + h.size*1.5, h.y + h.size/2,
                      h.x + h.size, h.y - h.size,
                      h.x, h.y);
    ctx.fill();

    ctx.restore();

    h.y += h.vy;
    h.alpha -= 0.02;
  }

  hearts = hearts.filter(h => h.alpha > 0);
}

// 👤 simple human robot
function drawRobot(x, y) {
  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 3;

  // head
  ctx.beginPath();
  ctx.arc(x, y - 40, 10, 0, Math.PI * 2);
  ctx.stroke();

  // body
  ctx.beginPath();
  ctx.moveTo(x, y - 30);
  ctx.lineTo(x, y);
  ctx.stroke();

  // arms
  ctx.beginPath();
  ctx.moveTo(x, y - 20);
  ctx.lineTo(x - 15, y - 10);
  ctx.moveTo(x, y - 20);
  ctx.lineTo(x + 15, y - 10);
  ctx.stroke();

  // legs (walking motion)
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - 10, y + 20);
  ctx.moveTo(x, y);
  ctx.lineTo(x + 10, y + 20);
  ctx.stroke();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // jet movement
  jetX += 4;
  if (jetX > canvas.width) jetX = -50;

  drawJet(jetX, jetY);
  createHeart(jetX, jetY);
  drawHearts();

  // robot movement
  robotX += dir;
  if (robotX > canvas.width - 50 || robotX < 50) dir *= -1;

  drawRobot(robotX, canvas.height - 80);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
